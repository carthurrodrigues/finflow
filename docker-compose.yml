services:
  postgres:
    image: postgres:17-alpine
    container_name: finflow-auth-postgres
    environment:
      POSTGRES_DB: finflow_auth
      POSTGRES_USER: finflow
      POSTGRES_PASSWORD: finflow
    ports:
      - "5432:5432"
    volumes:
      - finflow_auth_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finflow -d finflow_auth"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  finflow_auth_postgres_data:
